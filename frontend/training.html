<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrenamiento (dev) — LSC i5.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=2" />
  <script src="js/config.js?v=2"></script>
  <script src="js/api.js?v=2"></script>
  <script src="js/ui.js?v=2"></script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <div class="flex min-h-screen">
    <div id="nav-slot"></div>
    <main class="flex-1 p-6 lg:p-10">
      <div class="mb-6 flex items-center gap-3">
        <h1 class="text-2xl font-bold">Entrenamiento del modelo</h1>
        <span class="rounded bg-amber-100 px-2 py-0.5 text-xs font-bold text-amber-700 dark:bg-amber-900 dark:text-amber-300">MODO DEV</span>
      </div>

      <div class="grid gap-6 lg:grid-cols-3">
        <div class="card space-y-4 p-6">
          <h2 class="text-lg font-bold">Parámetros</h2>
          <div><label class="mb-1 block text-sm font-medium">Épocas</label><input id="epochs" type="number" class="input" value="80" min="1" /></div>
          <div><label class="mb-1 block text-sm font-medium">Batch size</label><input id="batch" type="number" class="input" value="32" min="1" /></div>
          <div><label class="mb-1 block text-sm font-medium">Learning rate</label><input id="lr" type="number" step="0.0001" class="input" value="0.0003" /></div>
          <div class="flex gap-2">
            <button id="startBtn" class="btn-primary flex-1">▶️ Iniciar</button>
            <button id="stopBtn" class="btn-danger">⏹️</button>
          </div>
          <div class="flex items-center gap-2 text-sm">
            <span id="stDot" class="h-3 w-3 rounded-full bg-slate-400"></span>
            <span id="stText" class="text-slate-500">Inactivo</span>
          </div>
        </div>

        <div class="card p-6 lg:col-span-2">
          <h2 class="text-lg font-bold">Registro de entrenamiento</h2>
          <pre id="logs" class="mt-4 h-80 overflow-auto rounded-xl bg-slate-900 p-4 text-xs text-emerald-300">(sin salida)</pre>
        </div>
      </div>
    </main>
  </div>

  <script>
    (async () => {
      const { devMode } = await window.LSC.ui.mountNav("training.html");
      if (!devMode) { window.LSC.ui.toast("Modo desarrollador desactivado", "warn"); location.href = "index.html"; return; }
      const $ = (id) => document.getElementById(id);
      let poll = null;

      const render = (s) => {
        const map = { idle: ["bg-slate-400","Inactivo"], running: ["bg-amber-500","Entrenando..."],
                      finished: ["bg-emerald-500","Finalizado"], failed: ["bg-rose-500","Fallido"] };
        const [cls, txt] = map[s.status] || map.idle;
        $("stDot").className = "h-3 w-3 rounded-full " + cls;
        $("stText").textContent = txt + (s.return_code !== null && s.return_code !== undefined ? ` (código ${s.return_code})` : "");
        $("logs").textContent = (s.logs && s.logs.length) ? s.logs.join("\n") : "(sin salida)";
        $("logs").scrollTop = $("logs").scrollHeight;
        if (s.status !== "running" && poll) { clearInterval(poll); poll = null; }
      };

      async function refresh() {
        try { render(await window.LSC.api.trainingStatus()); } catch (e) {}
      }
      refresh();

      $("startBtn").addEventListener("click", async () => {
        try {
          const s = await window.LSC.api.startTraining({
            epochs: parseInt($("epochs").value), batch_size: parseInt($("batch").value),
            lr: parseFloat($("lr").value),
          });
          render(s);
          window.LSC.ui.toast("Entrenamiento iniciado", "success");
          if (!poll) poll = setInterval(refresh, 2000);
        } catch (e) { window.LSC.ui.toast(e.message, "error"); }
      });

      $("stopBtn").addEventListener("click", async () => {
        try { render(await window.LSC.api.stopTraining()); window.LSC.ui.toast("Detenido", "info"); }
        catch (e) { window.LSC.ui.toast(e.message, "error"); }
      });
    })();
  </script>
</body>
</html>
